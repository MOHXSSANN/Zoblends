<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      @keyframes shimmer {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }
      .zb { animation: shimmer 2.4s ease-in-out infinite; }
    </style>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0d060"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a8832a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#0a0908"/>

  <!-- ZB text -->
  <text
    class="zb"
    x="32" y="44"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#gold)"
  >ZB</text>
</svg>
